name: CI/CD Pipeline Fastory Backend

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # CI — Compilación, Tests y Quality Gate ESTRICTO
  # ──────────────────────────────────────────────
  # Si los tests fallan → BUILD ROTO
  # Si SonarCloud Quality Gate falla → BUILD ROTO
  # ──────────────────────────────────────────────
  ci:
    name: "CI: Tests + SonarCloud Quality Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Compilar y Ejecutar Tests Unitarios
        run: mvn -B clean verify

      - name: Análisis SonarCloud con Quality Gate ESTRICTO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=fastory-backend
          -Dsonar.projectName='fastory-backend'
          -Dsonar.qualitygate.wait=false

  # ──────────────────────────────────────────────
  # CD — Build Docker + Push ECR + Deploy ECS
  # ──────────────────────────────────────────────
  cd:
    name: "CD: ECR Push + ECS Deploy"
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Determinar entorno
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configurar AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build y Push imagen Docker a ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: fastory-${{ steps.env.outputs.environment }}-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Descargar Task Definition actual
        env:
          TASK_FAMILY: fastory-${{ steps.env.outputs.environment }}-backend
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query taskDefinition \
            > task-definition.json

      - name: Renderizar nueva Task Definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.build.outputs.image }}

      - name: Desplegar a ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: fastory-${{ steps.env.outputs.environment }}-backend
          cluster: fastory-${{ steps.env.outputs.environment }}
          wait-for-service-stability: true
          wait-for-minutes: 5
